<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מחזה — נגן</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    direction: rtl;
  }
  #player-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #16213e;
    padding: 12px 20px;
    border-bottom: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  audio { display: none; }
  #controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
    direction: ltr;
  }
  #play-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #e94560;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #play-btn:hover { background: #c73652; }
  #time-display {
    font-size: 12px;
    color: #aaa;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #seek-bar {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #0f3460;
    border-radius: 2px;
    cursor: pointer;
    outline: none;
  }
  #seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e94560;
    cursor: pointer;
  }
  #search-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  #search-box {
    flex: 1;
    min-width: 200px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #0f3460;
    background: #0f3460;
    color: #fff;
    font-size: 15px;
    direction: rtl;
  }
  #search-box::placeholder { color: #888; }
  #search-info {
    font-size: 13px;
    color: #aaa;
    white-space: nowrap;
  }
  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .legend-item {
    font-size: 12px;
    padding: 2px 8px;
    border: 1.5px solid;
    border-radius: 12px;
    cursor: pointer;
  }
  #reduce-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  #reduce-label {
    font-size: 12px;
    color: #aaa;
    white-space: nowrap;
  }
  .reduce-btn {
    font-size: 12px;
    padding: 2px 8px;
    border: 1.5px solid;
    border-radius: 12px;
    cursor: pointer;
    background: transparent;
    transition: opacity 0.2s;
  }
  .reduce-btn.reduced {
    opacity: 0.3;
    text-decoration: line-through;
  }
  #speed-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #speed-label {
    font-size: 12px;
    color: #aaa;
    white-space: nowrap;
  }
  .speed-adj {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid #0f3460;
    background: transparent;
    color: #aaa;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .speed-adj:hover { border-color: #e94560; color: #e94560; }
  #speed-display {
    font-size: 13px;
    color: #e0e0e0;
    min-width: 38px;
    text-align: center;
  }
  #transcript {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }
  .line {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1.6;
  }
  .line:hover { background: #16213e; }
  .line.active { background: #0f3460; border-right: 3px solid #e94560; }
  .line.highlight { background: #2a2a00; }
  .char {
    min-width: 110px;
    max-width: 110px;
    font-weight: bold;
    font-size: 14px;
    text-align: right;
    flex-shrink: 0;
  }
  .text {
    flex: 1;
    font-size: 16px;
  }
  mark {
    background: #f0c040;
    color: #000;
    border-radius: 2px;
    padding: 0 1px;
  }
</style>
</head>
<body>

<div id="player-bar">
  <audio id="audio" src="__AUDIO_SRC__"></audio>
  <div id="controls-row">
    <button id="play-btn">▶</button>
    <span id="time-display">0:00 / 0:00</span>
    <input id="seek-bar" type="range" min="0" step="0.1" value="0">
  </div>
  <div id="search-row">
    <input id="search-box" type="text" placeholder="חיפוש בטקסט..." autocomplete="off">
    <span id="search-info"></span>
  </div>
  <div id="legend">__LEGEND_ITEMS__</div>
  <div id="reduce-row">
    <span id="reduce-label">הנמך עוצמה:</span>
    __REDUCE_ITEMS__
  </div>
  <div id="speed-row">
    <span id="speed-label">מהירות:</span>
    <button class="speed-adj" id="speed-down">−</button>
    <span id="speed-display">1×</span>
    <button class="speed-adj" id="speed-up">+</button>
  </div>
</div>

<div id="transcript">
__TRANSCRIPT__
</div>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const seekBar = document.getElementById('seek-bar');
const timeDisplay = document.getElementById('time-display');
const searchBox = document.getElementById('search-box');
const searchInfo = document.getElementById('search-info');
const speedDisplay = document.getElementById('speed-display');
const lines = Array.from(document.querySelectorAll('.line'));
let searchResults = [];
let searchIdx = 0;

// Web Audio API for per-character volume reduction
let audioCtx = null;
let gainNode = null;
const reducedChars = new Set();
const REDUCED_GAIN = 0.15;

function ensureAudioContext() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(audio);
  gainNode = audioCtx.createGain();
  source.connect(gainNode);
  gainNode.connect(audioCtx.destination);
}

// Play/pause
playBtn.addEventListener('click', () => {
  ensureAudioContext();
  if (audio.paused) { audio.play(); } else { audio.pause(); }
});
audio.addEventListener('play', () => { playBtn.textContent = '⏸'; });
audio.addEventListener('pause', () => { playBtn.textContent = '▶'; });

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

audio.addEventListener('loadedmetadata', () => {
  seekBar.max = audio.duration;
  timeDisplay.textContent = `0:00 / ${fmt(audio.duration)}`;
});

// Seek bar
let seeking = false;
seekBar.addEventListener('input', () => {
  seeking = true;
  timeDisplay.textContent = `${fmt(seekBar.value)} / ${fmt(audio.duration || 0)}`;
});
seekBar.addEventListener('change', () => {
  audio.currentTime = parseFloat(seekBar.value);
  // keep seeking=true until the audio engine confirms the seek
});
audio.addEventListener('seeked', () => {
  seeking = false;
});

function seekTo(t) {
  // Don't call ensureAudioContext() here — createMediaElementSource() on first
  // call can reset currentTime in some browsers. Resume only if already created.
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  audio.currentTime = t;
  seekBar.value = t;
  timeDisplay.textContent = `${fmt(t)} / ${fmt(audio.duration || 0)}`;
  audio.play().catch(() => {});
}

// Highlight active line + update seek bar + per-character gain
audio.addEventListener('timeupdate', () => {
  const t = audio.currentTime;
  if (!seeking) {
    seekBar.value = t;
    timeDisplay.textContent = `${fmt(t)} / ${fmt(audio.duration || 0)}`;
  }
  let currentChar = null;
  lines.forEach(el => {
    const start = parseFloat(el.dataset.start);
    const end = parseFloat(el.dataset.end);
    if (t >= start && t < end) {
      el.classList.add('active');
      currentChar = el.dataset.char;
      if (!isInViewport(el)) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    } else {
      el.classList.remove('active');
    }
  });
  if (gainNode) {
    gainNode.gain.value = currentChar && reducedChars.has(currentChar) ? REDUCED_GAIN : 1.0;
  }
});

function isInViewport(el) {
  const r = el.getBoundingClientRect();
  return r.top >= 80 && r.bottom <= window.innerHeight;
}

// Speed control
const SPEED_STEP = 0.25;
const SPEED_MIN = 0.25;
const SPEED_MAX = 3.0;

document.getElementById('speed-down').addEventListener('click', () => {
  const r = Math.max(SPEED_MIN, Math.round((audio.playbackRate - SPEED_STEP) * 100) / 100);
  audio.playbackRate = r;
  speedDisplay.textContent = `${r}×`;
});
document.getElementById('speed-up').addEventListener('click', () => {
  const r = Math.min(SPEED_MAX, Math.round((audio.playbackRate + SPEED_STEP) * 100) / 100);
  audio.playbackRate = r;
  speedDisplay.textContent = `${r}×`;
});

// Search
searchBox.addEventListener('input', () => {
  clearHighlights();
  const q = searchBox.value.trim();
  if (!q) { searchInfo.textContent = ''; return; }

  searchResults = [];
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');

  lines.forEach(el => {
    const textSpan = el.querySelector('.text');
    const orig = textSpan.textContent;
    if (re.test(orig)) {
      textSpan.innerHTML = orig.replace(re, m => `<mark>${m}</mark>`);
      searchResults.push(el);
    }
    re.lastIndex = 0;
  });

  if (searchResults.length > 0) {
    searchIdx = 0;
    scrollToResult();
    searchInfo.textContent = `${searchIdx + 1} / ${searchResults.length}`;
  } else {
    searchInfo.textContent = 'לא נמצא';
  }
});

searchBox.addEventListener('keydown', e => {
  if (searchResults.length === 0) return;
  if (e.key === 'Enter') {
    if (e.shiftKey) {
      searchIdx = (searchIdx - 1 + searchResults.length) % searchResults.length;
    } else {
      searchIdx = (searchIdx + 1) % searchResults.length;
    }
    scrollToResult();
    searchInfo.textContent = `${searchIdx + 1} / ${searchResults.length}`;
  }
});

function scrollToResult() {
  searchResults[searchIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  searchResults[searchIdx].classList.add('highlight');
  setTimeout(() => searchResults[searchIdx] && searchResults[searchIdx].classList.remove('highlight'), 1200);
}

function clearHighlights() {
  lines.forEach(el => {
    const textSpan = el.querySelector('.text');
    textSpan.innerHTML = textSpan.textContent;
  });
}

// Legend click → jump to first line of that character
document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const char = item.textContent;
    const first = lines.find(l => l.querySelector('.char').textContent === char);
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
});

// Reduce volume toggles
document.querySelectorAll('.reduce-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const char = btn.dataset.char;
    if (reducedChars.has(char)) {
      reducedChars.delete(char);
      btn.classList.remove('reduced');
    } else {
      reducedChars.add(char);
      btn.classList.add('reduced');
    }
  });
});
</script>
</body>
</html>
